name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-main:
    name: Build humanbound-firewall
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist-main
          path: dist/

  build-stub:
    name: Build hb-firewall transitional stub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - name: Build stub from compat/hb-firewall
        run: |
          cd compat/hb-firewall
          python -m build --outdir ../../dist-stub
      - uses: actions/upload-artifact@v7
        with:
          name: dist-stub
          path: dist-stub/

  publish-main:
    name: Publish humanbound-firewall to PyPI
    needs: build-main
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/humanbound-firewall/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-main
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

  publish-stub:
    name: Publish hb-firewall stub to PyPI
    needs: build-stub
    runs-on: ubuntu-latest
    environment:
      name: pypi-stub
      url: https://pypi.org/project/hb-firewall/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-stub
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

  release:
    name: Create GitHub Release
    needs: [publish-main, publish-stub]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist-main
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: dist-stub
          path: dist-stub/
      - name: Extract changelog entry for this tag
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          awk "/^## \[${VERSION}\]/{flag=1;print;next}/^## \[/{flag=0}flag" CHANGELOG.md > release_notes.md
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          body_path: release_notes.md
          files: |
            dist/*
            dist-stub/*
          generate_release_notes: false
