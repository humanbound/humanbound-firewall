name: Bug report
description: Something is broken or unexpected
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. **Security issues must not be reported here** —
        see [SECURITY.md](https://github.com/humanbound/humanbound-firewall/blob/main/SECURITY.md)
        for the private disclosure channel.

  - type: input
    id: version
    attributes:
      label: humanbound-firewall version
      description: Output of `pip show humanbound-firewall | grep Version`
      placeholder: "0.2.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.5 / Ubuntu 22.04 / etc."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Self-contained code snippet or steps that reproduce the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or traceback
      render: shell
